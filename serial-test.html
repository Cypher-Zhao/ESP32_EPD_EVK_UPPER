<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Serial 测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    #log { background: #f5f5f5; padding: 10px; margin-top: 20px; white-space: pre-wrap; height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
    .warning { color: orange; }
    .sent { color: #0066cc; }
    .received { color: #cc6600; }
  </style>
</head>
<body>
  <h1>Web Serial API 串口测试</h1>
  
  <div>
    <button id="checkSupport">检查 Web Serial 支持</button>
    <button id="selectPort" disabled>选择串口</button>
    <button id="openPort" disabled>打开串口</button>
    <button id="closePort" disabled>关闭串口</button>
  </div>
  
  <div style="margin-top: 10px;">
    <label>波特率: 
      <select id="baudRate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
      </select>
    </label>
    <label style="margin-left: 20px;">数据位: 
      <select id="dataBits">
        <option value="8" selected>8</option>
        <option value="7">7</option>
      </select>
    </label>
    <label style="margin-left: 20px;">停止位: 
      <select id="stopBits">
        <option value="1" selected>1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label style="margin-left: 20px;">校验位: 
      <select id="parity">
        <option value="none" selected>None</option>
        <option value="even">Even</option>
        <option value="odd">Odd</option>
      </select>
    </label>
  </div>
  
  <div style="margin-top: 10px;">
    <input type="text" id="sendData" placeholder="输入要发送的数据" style="width: 300px;" disabled>
    <button id="sendBtn" disabled>发送</button>
    <label style="margin-left: 10px;">
      <input type="checkbox" id="hexSend"> HEX发送
    </label>
    <label style="margin-left: 10px;">
      <input type="checkbox" id="addCRLF"> 末尾加回车换行
    </label>
  </div>
  
  <div style="margin-top: 10px;">
    <button id="clearLog">清空日志</button>
    <button id="copyLog">复制日志</button>
    <span id="status" style="margin-left: 20px; color: gray;">未连接</span>
  </div>
  
  <div id="log"></div>

  <script>
    const logEl = document.getElementById('log');
    const checkSupportBtn = document.getElementById('checkSupport');
    const selectPortBtn = document.getElementById('selectPort');
    const openPortBtn = document.getElementById('openPort');
    const closePortBtn = document.getElementById('closePort');
    const sendBtn = document.getElementById('sendBtn');
    const sendDataInput = document.getElementById('sendData');
    const baudRateSelect = document.getElementById('baudRate');
    const dataBitsSelect = document.getElementById('dataBits');
    const stopBitsSelect = document.getElementById('stopBits');
    const paritySelect = document.getElementById('parity');
    const hexSendCheckbox = document.getElementById('hexSend');
    const addCRLFCheckbox = document.getElementById('addCRLF');
    const statusEl = document.getElementById('status');
    
    let port = null;
    let reader = null;
    let isOpen = false;
    let keepReading = false;
    
    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      div.textContent = `[${time}] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    checkSupportBtn.onclick = () => {
      if ('serial' in navigator) {
        log('✅ Web Serial API 支持正常', 'success');
        selectPortBtn.disabled = false;
      } else {
        log('❌ 当前浏览器不支持 Web Serial API，请使用 Chrome/Edge 89+', 'error');
      }
    };
    
    selectPortBtn.onclick = async () => {
      try {
        port = await navigator.serial.requestPort();
        log('✅ 已选择串口', 'success');
        openPortBtn.disabled = false;
        statusEl.textContent = '串口已选择';
        statusEl.style.color = 'blue';
      } catch (err) {
        if (err.name === 'NotFoundError') {
          log('ℹ️ 用户取消选择串口', 'info');
        } else {
          log(`❌ 选择串口失败: ${err.message}`, 'error');
        }
      }
    };
    
    openPortBtn.onclick = async () => {
      if (!port) {
        log('❌ 请先选择串口', 'error');
        return;
      }
      
      try {
        const baudRate = parseInt(baudRateSelect.value);
        const dataBits = parseInt(dataBitsSelect.value);
        const stopBits = parseInt(stopBitsSelect.value);
        const parity = paritySelect.value;
        
        log(`正在打开串口: ${baudRate} bps...`);
        
        await port.open({
          baudRate,
          dataBits,
          stopBits,
          parity,
          bufferSize: 1024
        });
        
        isOpen = true;
        keepReading = true;
        
        log('✅ 串口已打开', 'success');
        openPortBtn.disabled = true;
        closePortBtn.disabled = false;
        sendBtn.disabled = false;
        sendDataInput.disabled = false;
        selectPortBtn.disabled = true;
        
        statusEl.textContent = `已连接 @ ${baudRate} bps`;
        statusEl.style.color = 'green';
        
        readData();
        
      } catch (err) {
        log(`❌ 打开串口失败: ${err.message}`, 'error');
      }
    };
    
    closePortBtn.onclick = async () => {
      await closePort();
      log('✅ 串口已关闭', 'success');
      statusEl.textContent = '已断开';
      statusEl.style.color = 'gray';
    };
    
    async function closePort() {
      keepReading = false;
      isOpen = false;
      
      try {
        if (reader) {
          await reader.cancel();
          reader.releaseLock();
          reader = null;
        }
        if (port) {
          await port.close();
        }
      } catch (err) {
        console.warn('关闭串口错误:', err);
      }
      
      openPortBtn.disabled = false;
      closePortBtn.disabled = true;
      sendBtn.disabled = true;
      sendDataInput.disabled = true;
      selectPortBtn.disabled = false;
    }
    
    async function readData() {
      while (keepReading && port && port.readable) {
        try {
          reader = port.readable.getReader();
          
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value && value.length > 0) {
              const hexStr = Array.from(value).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
              const textStr = new TextDecoder().decode(value);
              log(`📥 收到 ${value.length} 字节: ${hexStr}`, 'received');
              log(`   文本: ${textStr}`, 'received');
            }
          }
        } catch (err) {
          if (keepReading) log(`❌ 读取错误: ${err.message}`, 'error');
        } finally {
          if (reader) {
            reader.releaseLock();
            reader = null;
          }
        }
      }
    }
    
    sendBtn.onclick = async () => {
      const data = sendDataInput.value;
      if (!data) { log('❌ 请输入要发送的数据', 'error'); return; }
      if (!isOpen || !port || !port.writable) { log('❌ 串口未打开', 'error'); return; }
      
      try {
        let buffer;
        if (hexSendCheckbox.checked) {
          const hexStr = data.replace(/\s+/g, '');
          if (!/^[0-9A-Fa-f]+$/.test(hexStr) || hexStr.length % 2 !== 0) {
            log('❌ HEX 格式错误', 'error');
            return;
          }
          const bytes = [];
          for (let i = 0; i < hexStr.length; i += 2) {
            bytes.push(parseInt(hexStr.substring(i, i + 2), 16));
          }
          buffer = new Uint8Array(bytes);
        } else {
          buffer = new TextEncoder().encode(data);
        }
        
        if (addCRLFCheckbox.checked) {
          buffer = new Uint8Array([...buffer, 0x0D, 0x0A]);
        }
        
        const writer = port.writable.getWriter();
        await writer.write(buffer);
        writer.releaseLock();
        
        const hexStr = Array.from(buffer).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
        log(`📤 已发送 ${buffer.length} 字节: ${hexStr}`, 'sent');
        
        sendDataInput.value = '';
        sendDataInput.focus();
      } catch (err) {
        log(`❌ 发送失败: ${err.message}`, 'error');
      }
    };
    
    sendDataInput.onkeydown = (e) => { if (e.key === 'Enter') sendBtn.click(); };
    document.getElementById('clearLog').onclick = () => { logEl.innerHTML = ''; };
    document.getElementById('copyLog').onclick = () => {
      navigator.clipboard.writeText(logEl.innerText).then(() => log('✅ 已复制', 'success'));
    };
    
    if ('serial' in navigator) {
      navigator.serial.addEventListener('disconnect', (e) => {
        if (port === e.target) {
          log('🔌 设备已断开', 'warning');
          closePort();
          statusEl.textContent = '设备已断开';
          statusEl.style.color = 'red';
          port = null;
        }
      });
    }
  </script>
</body>
</html>
